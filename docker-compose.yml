services:

  # ── MySQL Database ────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: eon_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-eon_secret}
      MYSQL_DATABASE: ${DB_NAME:-product_catalog}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/database/seed-products.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-eon_secret}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ── Node.js Backend ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eon_backend
    restart: unless-stopped
    # .env.backend is mounted as a volume so Node's dotenv reads it directly —
    # zero interpolation by Docker Compose, so bcrypt $ signs are preserved.
    volumes:
      - ./.env.backend:/app/.env:ro
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Vue Frontend (Nginx) ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eon_frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mysql_data:
  uploads_data:
